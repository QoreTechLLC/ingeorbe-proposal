<svg width="2000" height="1200" viewBox="0 0 2000 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16243d"/>
      <stop offset="100%" stop-color="#1f3354"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#f7f5f0" stroke-width="1" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="2000" height="1200" fill="url(#bg)"/>
  <rect width="2000" height="1200" fill="url(#grid)"/>

  <!-- Abstract road / overpass lines, suggesting infrastructure without being literal -->
  <g stroke="#d87c2c" stroke-width="3" opacity="0.35" fill="none">
    <path d="M -100 850 C 400 750, 900 950, 1400 800 S 2100 650, 2300 700"/>
    <path d="M -100 950 C 450 870, 950 1020, 1450 900 S 2100 780, 2300 820"/>
  </g>
  <g stroke="#f7f5f0" stroke-width="1.5" opacity="0.18" fill="none">
    <path d="M -100 600 C 500 500, 1000 700, 1500 580 S 2100 480, 2300 520"/>
  </g>

  <!-- Survey / measurement tick marks, echoing the site's signature motif -->
  <g stroke="#f7f5f0" stroke-width="1" opacity="0.25">
    <line x1="200" y1="100" x2="200" y2="140"/>
    <line x1="180" y1="120" x2="220" y2="120"/>
    <line x1="1750" y1="1000" x2="1750" y2="1040"/>
    <line x1="1730" y1="1020" x2="1770" y2="1020"/>
  </g>
</svg>
